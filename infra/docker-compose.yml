version: "3"

services:
  mysql:
    image: registry.cn-guangzhou.aliyuncs.com/root-pandora/mysql:8.0
    restart: always
    env_file:
      - .env
    container_name: mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      - MYSQL_ROOT_PASSWORD=qch@123456
      - MYSQL_USER=pandora
      - MYSQL_PASSWORD=qch@123456
      - MYSQL_DATABASE=pandora
    ports:
      - 3306:3306
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"
    volumes:
      - ./mysql/conf.d:/etc/mysql/conf.d
      - ${PATH_PREFIX}/mysql/data:/var/lib/mysql

  redis:
    image: registry.cn-guangzhou.aliyuncs.com/root-pandora/redis:6.2.17
    container_name: redis
    volumes:
      - ${PATH_PREFIX}/redis:/data
      - ./redis/conf.d:/etc/redis
    ports:
      - "6379:6379"
    restart: always

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    env_file:
      - .env
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=qch@123456
    ports:
      - "5432:5432"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"
    volumes:
      - ${PATH_PREFIX}/postgres/data:/var/lib/postgresql/data
      - ./postgres/init.d:/docker-entrypoint-initdb.d

  flower:
    image: mher/flower
    container_name: flower
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
    restart: always
